name: Feature Request
description: Suggest a feature for Code Memory
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the problem you're trying to solve.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area does this feature relate to?
      options:
        - MCP Tool
        - CLI Command
        - Indexing / Parser
        - Search / Context
        - Graph Analysis
        - Multi-Repo
        - Performance
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or references.
