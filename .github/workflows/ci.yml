name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --maxWorkers=1 --minWorkers=1 --no-file-parallelism
      - if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:coverage -- --maxWorkers=1 --minWorkers=1 --no-file-parallelism
      - run: npm run pack:check
      - run: npm run test:smoke
      - run: npm run audit:official
      - run: npm run benchmark:index -- --files 50 --workers 0 --embedding none
      - run: npm run benchmark:context
      - run: npm run benchmark:agent
      - run: node dist/index.js --help
