name: Real Repo Benchmark

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm run build
      - name: Run real repo benchmark
        run: npm run benchmark:real-repos -- --fail-on-threshold > real-repos.json
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: real-repo-benchmark
          path: real-repos.json
