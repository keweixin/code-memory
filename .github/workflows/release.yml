name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run pack:check
      - run: npm run audit:official
