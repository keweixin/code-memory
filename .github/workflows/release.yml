name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Checkout release tag for manual run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Manual release requires existing tag $TAG" >&2
            exit 1
          fi
          git checkout "$TAG"
      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            REF_TAG="${GITHUB_REF_NAME#v}"
            if [ "$VERSION" != "$REF_TAG" ]; then
              echo "Tag v$REF_TAG does not match package.json version $VERSION" >&2
              exit 1
            fi
          fi
          HEAD_TAG="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          if [ "$HEAD_TAG" != "v$VERSION" ]; then
            echo "Release source must be exactly tag v$VERSION, got '${HEAD_TAG:-untagged}'" >&2
            exit 1
          fi
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm run release:gate
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required for release publishing." >&2
            exit 1
          fi
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published; skipping npm publish."
          else
            npm publish --access public --provenance
          fi
          npm dist-tag add "$PACKAGE_NAME@$VERSION" latest --registry=https://registry.npmjs.org
          for attempt in 1 2 3 4 5 6; do
            LATEST="$(npm view "$PACKAGE_NAME" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
            if [ "$LATEST" = "$VERSION" ]; then
              echo "npm latest verified: $PACKAGE_NAME@$LATEST"
              exit 0
            fi
            echo "npm latest is '${LATEST:-unavailable}', waiting for $VERSION (attempt $attempt/6)"
            sleep 10
          done
          echo "npm latest did not resolve to $VERSION" >&2
          exit 1
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          VERSION="$VERSION" node - <<'NODE'
            const fs = require('fs');
            const version = process.env.VERSION;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = changelog.split(/\r?\n/);
            const start = lines.findIndex((line) => line.startsWith(`## [${version}]`) || line.startsWith(`## ${version}`));
            const end = start < 0 ? -1 : lines.findIndex((line, index) => index > start && line.startsWith('## '));
            const notes = start < 0 ? changelog : lines.slice(start, end < 0 ? lines.length : end).join('\n');
            fs.writeFileSync('RELEASE_NOTES.md', notes.trim() + '\n');
          NODE
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "v$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "v$VERSION" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "v$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "v$VERSION" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag
          fi
